<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apna Mini Mart - Admin</title>
<meta name="theme-color" content="#22C55E" />
<link rel="icon" href="icons/icon-96.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Login screen -->
<div class="login-wrap" id="loginWrap">
  <h1>Apna Mini Mart</h1>
  <p>Admin panel - enter password to manage products</p>
  <div class="form-group">
    <input type="password" id="adminPassword" placeholder="Admin password" />
  </div>
  <button class="primary-btn" id="loginBtn">Login</button>
  <div id="loginError" style="color:#EF4444;font-size:13px;margin-top:8px;"></div>
</div>

<!-- Admin dashboard (hidden until logged in) -->
<div id="adminDashboard" style="display:none;">
  <div class="admin-header">Apna Mini Mart - Admin</div>
  <div class="admin-wrap">

    <div class="admin-card">
      <h3 style="margin-top:0;">Add New Product</h3>
      <div class="form-group"><label>Name</label><input type="text" id="newName" /></div>
      <div class="form-group">
        <label>Category</label>
        <select id="newCategory">
          <option>Grocery</option><option>Dairy</option><option>Snacks</option>
          <option>Beverages</option><option>Frozen</option><option>Personal Care</option><option>Household</option>
        </select>
      </div>
      <div class="form-group"><label>Price (₹)</label><input type="number" id="newPrice" /></div>
      <div class="form-group"><label>Unit (e.g. 1 kg, 500 ml)</label><input type="text" id="newUnit" /></div>
      <div class="form-group"><label>Variants (comma-separated, optional)</label><input type="text" id="newVariants" placeholder="500 g, 1 kg" /></div>
      <div class="form-group">
        <label>Stock status</label>
        <select id="newStock">
          <option value="in_stock">In stock</option>
          <option value="low_stock">Low stock</option>
          <option value="out_of_stock">Out of stock</option>
        </select>
      </div>
      <button class="primary-btn" id="addProductBtn">Add Product</button>
    </div>

    <h3>Current Products</h3>
    <div id="productList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
</body>
</html>
