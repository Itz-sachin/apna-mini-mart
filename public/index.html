<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Apna Mini Mart - Order Groceries Online</title>
<meta name="description" content="Order groceries, dairy, snacks, beverages, frozen foods, personal care and household essentials from Apna Mini Mart, Faridabad." />
<meta name="theme-color" content="#22C55E" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-96.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="offlineBanner" class="offline-banner">You're offline - showing last saved catalog. Cart & checkout still work.</div>

<header class="app-header">
  <div class="brand">
    <img src="icons/icon-96.png" alt="Apna Mini Mart" />
    <span>Apna Mini Mart</span>
  </div>
  <button class="cart-btn" id="cartBtn" aria-label="Open cart">
    🛒
    <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
  </button>
</header>

<div class="search-bar">
  <input type="search" id="searchInput" placeholder="Search grocery, dairy, snacks..." />
</div>

<div class="category-scroll" id="categoryScroll">
  <!-- category chips injected by app.js -->
</div>

<main>
  <div class="product-grid" id="productGrid">
    <!-- product cards injected by app.js -->
  </div>
</main>

<!-- Sticky checkout bar (shown when cart has items) -->
<div class="checkout-fab hidden" id="checkoutFab">
  <div class="total-block">
    <span class="label" id="fabItemCount">0 items</span>
    <span class="amount" id="fabTotal">₹0</span>
  </div>
  <button id="fabCheckoutBtn">View Cart</button>
</div>

<!-- Product detail sheet -->
<div class="overlay hidden" id="productOverlay">
  <div class="sheet" id="productSheet">
    <button class="close-x" data-close="productOverlay">✕</button>
    <div class="sheet-handle"></div>
    <div id="productSheetContent"></div>
  </div>
</div>

<!-- Cart sheet -->
<div class="overlay hidden" id="cartOverlay">
  <div class="sheet">
    <button class="close-x" data-close="cartOverlay">✕</button>
    <div class="sheet-handle"></div>
    <h2>Your Cart</h2>
    <div id="cartLines"></div>
    <div id="cartSummary"></div>
    <button class="primary-btn" id="goToCheckoutBtn">Proceed to Checkout</button>
  </div>
</div>

<!-- Checkout sheet -->
<div class="overlay hidden" id="checkoutOverlay">
  <div class="sheet">
    <button class="close-x" data-close="checkoutOverlay">✕</button>
    <div class="sheet-handle"></div>
    <h2>Checkout</h2>
    <div class="form-group">
      <label for="custName">Full name</label>
      <input type="text" id="custName" placeholder="Your name" />
    </div>
    <div class="form-group">
      <label for="custPhone">Phone number</label>
      <input type="tel" id="custPhone" placeholder="10-digit mobile number" />
    </div>
    <div class="form-group">
      <label for="custAddress">Delivery address</label>
      <textarea id="custAddress" rows="2" placeholder="House no., street, landmark"></textarea>
    </div>
    <div class="form-group">
      <button type="button" class="secondary-btn" id="locBtn" style="margin-top:0;">📍 Use My Current Location</button>
      <div id="locStatus" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
    </div>
    <div class="form-group">
      <label>Payment method</label>
      <div class="pay-options">
        <div class="pay-option selected" data-pay="COD">Cash on Delivery</div>
        <div class="pay-option" data-pay="UPI">UPI</div>
      </div>
    </div>
    <div class="upi-box" id="upiBox" style="display:none;">
      <div>Scan &amp; pay using any UPI app</div>
      <img src="images/upi-qr.png" alt="UPI QR code" />
      <div class="upi-id" id="upiIdText">apnaminimart@upi</div>
    </div>
    <div id="checkoutSummary"></div>
    <button class="primary-btn" id="placeOrderBtn">Place Order via WhatsApp</button>
    <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px;">
      Tapping this opens WhatsApp with your order pre-filled, sent directly to the shop.
    </p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
